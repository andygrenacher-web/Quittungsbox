name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - "artifacts/quittungsbox/**"
      - ".github/workflows/build-android-apk.yml"
  workflow_dispatch:   # allow manual trigger from GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── Checkout ───────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node.js + pnpm ─────────────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Build the web layer ────────────────────────────────────────────────
      - name: Build web assets for Android
        working-directory: artifacts/quittungsbox
        run: pnpm run build:android

      # ── Java + Android SDK ─────────────────────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── Capacitor sync ─────────────────────────────────────────────────────
      - name: Sync Capacitor (copies web dist → android/app/src/main/assets)
        working-directory: artifacts/quittungsbox
        run: npx cap sync android

      # ── Gradle build ───────────────────────────────────────────────────────
      - name: Make gradlew executable
        working-directory: artifacts/quittungsbox/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: artifacts/quittungsbox/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── Upload artifact ────────────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: quittungsbox-debug-apk
          path: artifacts/quittungsbox/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── Optional: attach to GitHub release ───────────────────────────────
      # To build a signed release APK, add secrets:
      #   KEYSTORE_BASE64, KEY_ALIAS, KEY_PASSWORD, STORE_PASSWORD
      # and uncomment the release step below.
      #
      # - name: Build release APK (signed)
      #   if: startsWith(github.ref, 'refs/tags/v')
      #   working-directory: artifacts/quittungsbox/android
      #   run: |
      #     echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks
      #     ./gradlew assembleRelease \
      #       -Pandroid.injected.signing.store.file=keystore.jks \
      #       -Pandroid.injected.signing.store.password=${{ secrets.STORE_PASSWORD }} \
      #       -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
      #       -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}
