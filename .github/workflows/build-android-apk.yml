name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - "artifacts/quittungsbox/**"
      - ".github/workflows/build-android-apk.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── Checkout ───────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node.js + pnpm ─────────────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Allow build scripts (tesseract.js, core-js)
        run: pnpm approve-builds --all || true

      # ── Build shared libs first ────────────────────────────────────────────
      - name: Build shared libs
        run: pnpm run typecheck:libs || true

      # ── Build the web layer ────────────────────────────────────────────────
      - name: Build web assets for Android
        working-directory: artifacts/quittungsbox
        run: pnpm run build:android

      # ── Java + Android SDK ─────────────────────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── Capacitor sync ─────────────────────────────────────────────────────
      - name: Sync Capacitor
        working-directory: artifacts/quittungsbox
        run: npx cap sync android

      # ── Gradle build ───────────────────────────────────────────────────────
      - name: Make gradlew executable
        working-directory: artifacts/quittungsbox/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: artifacts/quittungsbox/android
        run: ./gradlew assembleDebug --no-daemon

      # ── Upload artifact ────────────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: quittungsbox-debug-apk
          path: artifacts/quittungsbox/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
