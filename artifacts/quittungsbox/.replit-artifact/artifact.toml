kind = "web"
previewPath = "/"
title = "Quittungsbox"
version = "1.0.0"
id = "artifacts/quittungsbox"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19404

[services.development]
run = "pnpm --filter @workspace/quittungsbox run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/quittungsbox", "run", "build" ]
publicDir = "artifacts/quittungsbox/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19404"
BASE_PATH = "/"
